<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YlfChemi — ChemiGenerator</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/smiles-drawer@1.2.0/dist/smiles-drawer.min.js"></script>
</head>
<body>
    <header id="header">
        <div class="header-title">YlfChemi</div>
        <div class="header-sub">ChemiGenerator</div>
    </header>

    <main id="workspace">
        <div class="tool-description">Enter a chemical compound name, formula, or reaction description to generate structured output.</div>

        <div class="options-row">
            <label class="lang-label">Language</label>
            <select id="lang-select" class="lang-select">
                <option value="cn">中文</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="input-row">
            <input type="text" id="gen-input" placeholder="e.g. benzene, H2SO4, iron burns in oxygen..." spellcheck="false">
            <button class="btn-primary" id="gen-btn" onclick="generate()">Generate</button>
        </div>

        <div id="gen-loading" class="gen-loading hidden">Generating...</div>

        <div id="gen-output" class="output-panel hidden">
            <div class="output-row" id="row-name">
                <span class="output-label">Name</span>
                <span class="output-value" id="out-name"></span>
            </div>
            <div class="output-row" id="row-formula">
                <span class="output-label">Formula</span>
                <span class="output-value" id="out-formula"></span>
                <button class="btn-copy" onclick="copyText('out-formula')">Copy</button>
            </div>
            <div class="output-row" id="row-type">
                <span class="output-label">Type</span>
                <span class="output-value" id="out-type"></span>
            </div>
            <div class="output-row" id="row-latex">
                <span class="output-label">LaTeX</span>
                <span class="output-value mono" id="out-latex"></span>
                <button class="btn-copy" onclick="copyText('out-latex')">Copy</button>
            </div>
            <div class="output-row" id="row-markdown">
                <span class="output-label">Markdown</span>
                <span class="output-value mono" id="out-markdown"></span>
                <button class="btn-copy" onclick="copyText('out-markdown')">Copy</button>
            </div>
            <div class="output-row" id="row-rendered">
                <span class="output-label">Rendered</span>
                <span class="output-value" id="out-katex-render"></span>
            </div>
            <div class="output-row" id="row-reaction">
                <span class="output-label">Reaction</span>
                <span class="output-value" id="out-reaction"></span>
                <button class="btn-copy" onclick="copyText('out-reaction')">Copy</button>
            </div>
            <div class="output-row" id="row-products">
                <span class="output-label">Products</span>
                <span class="output-value" id="out-products"></span>
            </div>
            <div class="output-row" id="row-smiles">
                <span class="output-label">SMILES</span>
                <span class="output-value mono" id="out-smiles"></span>
                <button class="btn-copy" onclick="copyText('out-smiles')">Copy</button>
            </div>
            <div class="output-row" id="row-explanation">
                <span class="output-label">Explain</span>
                <span class="output-value" id="out-explanation"></span>
            </div>
            <div id="structure-box" class="hidden">
                <div class="structure-title">Structure</div>
                <canvas id="smiles-canvas" width="320" height="260"></canvas>
            </div>
        </div>

        <div id="gen-error" class="result-error hidden"></div>
    </main>

    <footer id="footer">
        <span>YlfChemi</span>
        <span>·</span>
        <span>Powered By Creeper.｜动力来自杨林丰</span>
    </footer>

    <script src="/app.js"></script>
</body>
</html>
